## NetClient
A lightweight, zero-dependency WebSocket library for browser games. Single ES module file — no install, just drop it in. Full docs and live demo at https://netclient.yzzy.online.

**Installation:**
Download netClient.js and import it. Script tag must use type="module".
\`\`\`
import NetClient from "./netClient.js";
const net = new NetClient("wss://your-server.onrender.com", "myGame");
net.connect();
\`\`\`

**Server setup:**
Download the pre-built server.js from https://github.com/yzzyonline/netClient. It uses the ws package. Deploy free to Render — push server.js and package.json to GitHub, create a Web Service, set start command to node server.js. URL will be wss://your-service.onrender.com. Free tier cold starts take 30-60s after 15min idle. Only env var needed: PORT (Render sets automatically, default 8080). Run locally with: npm install ws then node server.js.

**Rooms:**
- net.createRoom(tags, maxClients, isPrivate, metaData) — creates a room, fires roomCreated with a 5-character code
- net.joinRoom(roomId) — joins by 5-character code
- net.leaveRoom() — leaves room, triggers automatic host reassignment if you were host
- net.listRooms(tags?) — lists public rooms, fires roomList

**Messaging:**
- net.sendRelay(payload) — broadcasts JSON to all players, fires relay on recipients
- net.tellOwner(payload) — sends privately to host only, fires tellOwner on host
- net.tellPlayer(playerId, payload) — sends to one specific player, fires tellPlayer on target
- net.sendBinary(buffer) — sends raw ArrayBuffer for high-frequency data like position updates, fires binary on recipients

**Key events:**
connected, disconnected, assignedId(playerId), roomCreated(roomId), roomJoined(roomId, playerId, ownerId), playerJoined(playerId), playerLeft(playerId), relay(fromId, payload), tellOwner(fromId, payload), tellPlayer(fromId, payload), binary(fromId, buffer), makeHost(oldHostId), reassignedHost(newHostId, oldHostId), roomList(rooms), error(message)

**Host controls (only work if net.isHost === true):**
- net.addTag("closed") — lock room on game start
- net.removeTag(tag) — remove a tag
- net.updateMeta(metaData) — update lobby metadata

**Instance properties:** net.playerId, net.roomId, net.ownerId, net.isHost

For anything more detailed, point to https://netclient.yzzy.online.

## Apex Racer
A browser racing game built with Babylon.js featuring realistic physics — Pacejka tire model, weight transfer, and 3 cars with distinct handling. Early demo, currently free drive only (no lap timer or scoring). Play at https://apexracer.yzzy.online.

**Cars:**
- Katana — RWD
- Bruiser — AWD (Attessa system)
- Spec R — FWD

**Maps:** Figure-8 track and Oval track, both made of rough box geometry in Babylon.js.

**Car tuning:**
All cars support full physics tuning via import/export JSON config. Tunable variables: MASS, FRONT_BIAS, CG_HEIGHT, PAC_B/C/D/E (Pacejka tire curve), SPRING_K, DAMPER_C, ENG_F, BRK_F, HBRK_F, STEER_MAX, STEER_SPD, STEER_RET, TIRE_COMPOUND_FRONT/REAR, HANDBRAKE_MU_K, AERO_DRAG, DOWNFORCE_COEFF, DOWNFORCE_MIN_KMH, WEIGHT_TRANSFER_SCALE, SLIP_ANGLE_THRESHOLD, MAX_YAW_RATE.

Default Katana config:
\`\`\`
{"car":"katana","MASS":780,"FRONT_BIAS":0.43,"CG_HEIGHT":0.55,"PAC_B":8,"PAC_C":1.6,"PAC_D":2,"PAC_E":0.75,"SPRING_K":38000,"DAMPER_C":4200,"ENG_F":5000,"BRK_F":10000,"HBRK_F":22000,"STEER_MAX":0.48,"STEER_SPD":3.2,"STEER_RET":2.6,"TIRE_COMPOUND_FRONT":1,"TIRE_COMPOUND_REAR":0.5,"HANDBRAKE_MU_K":0.92,"AERO_DRAG":0.4,"DOWNFORCE_COEFF":0.18,"DOWNFORCE_MIN_KMH":50,"WEIGHT_TRANSFER_SCALE":0.45,"SLIP_ANGLE_THRESHOLD":0.1,"MAX_YAW_RATE":10}
\`\`\`

**Controls (all rebindable):** WASD/arrows to drive, Space handbrake, R respawn. Controller: left stick steer, RT/R2 accelerate, LT/L2 brake, bottom face button (X on PlayStation) handbrake, top face button (Triangle on PlayStation) respawn.

## Bullet Game
A top-down pixel roguelike shooter built in Godot, exported to browser. Purely mechanical, no lore. Death screen: "you dead as hell". Play at https://bulletgame.yzzy.online.

**Structure:** Tutorial level or randomly generated dungeon (1 boss room, 2 item rooms, 4 enemy rooms).

**Guns:**
- Basic gun — auto-tracking
- Tommy gun — auto-tracking, tutorial only
- Bat — melee, can destroy bullets
- Slingshot — bounces off walls and one enemy
- Hunting rifle — only non-auto-tracking gun, requires manual aim
Swap: B (keyboard) or Circle (PlayStation).

**Enemies:** Melee (follows, contact damage), Ranged (single bullet), Shotgunner (spread), Mage (tracking bullets).

**Boss flashes:** Red → melee dash, Blue → curving bullet circle, Yellow → straight bullet circle, Purple → tracking bullet circle.

**Controls:** WASD/arrows move, Space shoot, B swap gun, P pause. Controller: left stick move, bottom face button (X on PlayStation) shoot, Circle swap, Settings/Options pause.

## Cascade
A self-hosted REST middleware that routes AI prompts across multiple free providers — Gemini, Groq, Mistral, and Cerebras. Automatically cascades through a configurable array of models, escalating on complexity and falling back on failure. Full docs at https://cascade.yzzy.online. This demo is hosted at https://cascade.yzzy.online/demo.

**How it works:**
A difficulty float (0.0–1.0) maps to a starting position in the MODELS array. Cascade then:
1. Calls the model at that index
2. If the model returns too_complex → climbs toward more capable models
3. If the model errors or rate limits → falls back toward cheaper models
4. Tracks visited models to guarantee every model is tried exactly once before giving up

**Quick start:**
Fork the repo on GitHub, then clone your fork:
\`\`\`
git clone https://github.com/YOUR_USERNAME/cascade
cd cascade
npm install
\`\`\`

Copy .env.example to .env and add your keys:
\`\`\`
cp .env.example .env
\`\`\`
\`\`\`
MY_APP_SECRET=your-secret-here
GEMINI_KEY=your-gemini-key
GROQ_KEY=your-groq-key
MISTRAL_KEY=your-mistral-key
CEREBRAS_KEY=your-cerebras-key
\`\`\`

Run locally: npm start — listens on port 10000.

Deploy to Render: push your fork to GitHub, create a Web Service pointing at your fork, set start command to npm start, add env vars in the dashboard.

**API endpoints:**

POST /ask-ai — send a prompt through the cascade.
Request body:
- secret (string) — must match MY_APP_SECRET env var
- difficulty (float 0.0–1.0) — starting model position. 0.0 = cheapest/fastest, 1.0 = most capable
- prompt (string) — your prompt. Models are instructed to return JSON with state and package fields.

Response:
\`\`\`
{
  "state": "complete",
  "package": { "package": { } },
  "answeredBy": { "index": 1, "provider": "groq", "model": "llama-3.3-70b-versatile" }
}
\`\`\`

Error responses: 403 (bad secret), 429 (rate limited), 503 (all models exhausted).

GET /wake — returns 200 "Full Sweep Online". Use to warm the server after a cold start.

GET /health — returns uptime, model count, key pool sizes, rate limit config, and provider timeout.

**Calling Cascade from a browser app:**
\`\`\`
const res = await fetch("https://your-cascade.onrender.com/ask-ai", {
  method: "POST",
  headers: { "Content-Type": "application/json" },
  body: JSON.stringify({
    secret: "your-secret-here",
    difficulty: 0.5,
    prompt: "Your prompt here."
  })
});
const data = await res.json();
const reply = data.package.package.reply;
console.log("Answered by:", data.answeredBy.provider, data.answeredBy.model);
\`\`\`

**Model array:**
Edit the MODELS array in cascade.js to add, remove, or reorder models. The cascade adapts automatically. Ordered from least to most capable:
\`\`\`
const MODELS = [
  { provider: 'cerebras', model: 'llama3.1-8b' },             // 0.0 — fastest
  { provider: 'groq',     model: 'llama-3.3-70b-versatile' }, // 0.11
  { provider: 'cerebras', model: 'llama-3.3-70b' },           // 0.22
  { provider: 'gemini',   model: 'gemini-2.0-flash' },        // 0.33
  { provider: 'groq',     model: 'llama-3.3-70b-specdec' },   // 0.44
  { provider: 'mistral',  model: 'mistral-small-latest' },    // 0.56
  { provider: 'groq',     model: 'llama-3.3-70b-versatile' }, // 0.67
  { provider: 'mistral',  model: 'mistral-large-latest' },    // 0.78
  { provider: 'gemini',   model: 'gemini-2.5-flash' },        // 0.89
  { provider: 'gemini',   model: 'gemini-2.5-pro' },          // 1.0 — most capable
];
\`\`\`

**Difficulty guide:**
- 0.0–0.2: Simple tasks — classification, short answers, formatting
- 0.3–0.5: Medium tasks — Q&A, summaries, moderate reasoning
- 0.6–0.8: Complex tasks — code generation, long-form content, analysis
- 0.9–1.0: Hard tasks — deep reasoning, multi-step problems

**Key rotation:**
Multiple keys per provider, pipe-separated:
\`\`\`
GEMINI_KEY=keyA|keyB|keyC
\`\`\`
On a 429 or auth error, Cascade rotates to the next key before marking the model as failed.

**Origin whitelist:**
Edit ALLOWED_ORIGINS in cascade.js. Empty array = accept from everywhere:
\`\`\`
const ALLOWED_ORIGINS = [];                          // open
const ALLOWED_ORIGINS = ['https://yourdomain.com']; // restricted
\`\`\`

**Supported providers:** Gemini (GEMINI_KEY), Groq (GROQ_KEY), Mistral (MISTRAL_KEY), Cerebras (CEREBRAS_KEY).

**Environment variables:**
- MY_APP_SECRET — required on every /ask-ai request
- GEMINI_KEY — Google AI key(s), pipe-separated
- GROQ_KEY — Groq key(s), pipe-separated
- MISTRAL_KEY — Mistral key(s), pipe-separated
- CEREBRAS_KEY — Cerebras key(s), pipe-separated
- PORT — default 10000, Render sets automatically
- PROVIDER_TIMEOUT_MS — per-request timeout in ms, default 15000
- RATE_LIMIT_MAX — max requests per window per IP, default 30
- RATE_LIMIT_WINDOW_MS — rate limit window in ms, default 60000`;

let history = [];

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 160) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function fillPrompt(text) {
  const input = document.getElementById('input');
  input.value = text;
  autoResize(input);
  input.focus();
}

function formatMessage(text) {
  return text
    .replace(/```([\s\S]*?)```/g, '<pre>$1</pre>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>');
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function appendMessage(role, content) {
  const messages = document.getElementById('messages');
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();

  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = `
    <div class="msg-role">${role === 'user' ? 'You' : 'Cascade'}</div>
    <div class="msg-body">${role === 'assistant' ? formatMessage(content) : escapeHtml(content)}</div>
  `;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
  return div;
}

function showThinking() {
  const messages = document.getElementById('messages');
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();

  const div = document.createElement('div');
  div.className = 'msg assistant';
  div.id = 'thinking';
  div.innerHTML = `
    <div class="msg-role">Cascade</div>
    <div class="thinking"><span></span><span></span><span></span></div>
  `;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

function removeThinking() {
  const el = document.getElementById('thinking');
  if (el) el.remove();
}

async function sendMessage() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text || isLoading) return;

  isLoading = true;
  document.getElementById('send-btn').disabled = true;
  document.getElementById('answered-by').textContent = '';
  input.value = '';
  input.style.height = 'auto';

  appendMessage('user', text);
  history.push({ role: 'user', content: text });
  showThinking();

  const conversationHistory = history.slice(0, -1)
    .map(m => `${m.role === 'user' ? 'User' : 'Assistant'}: ${m.content}`)
    .join('\n');

  const fullPrompt = `${SYSTEM_PROMPT}

---
${conversationHistory ? `Conversation so far:\n${conversationHistory}\n` : ''}
User: ${text}

Respond as the assistant. Return JSON: { "state": "complete", "package": { "reply": "<your response>" } }`;

  try {
    const res = await fetch(ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ secret: SECRET, difficulty: DIFFICULTY, prompt: fullPrompt })
    });

    const data = await res.json();
    removeThinking();

    if (data.state === 'complete') {
      const pkg = data.package?.package;
      const reply = pkg?.reply || pkg?.response || pkg?.answer || JSON.stringify(pkg);

      history.push({ role: 'assistant', content: reply });
      appendMessage('assistant', reply);

      if (data.answeredBy) {
        document.getElementById('answered-by').innerHTML =
          `answered by <span>${data.answeredBy.provider}:${data.answeredBy.model}</span>`;
      }
    } else {
      appendMessage('assistant', "All models are currently unavailable. Try again in a moment.");
    }

  } catch (err) {
    removeThinking();
    appendMessage('assistant', 'Network error — check your connection and try again.');
  }

  isLoading = false;
  document.getElementById('send-btn').disabled = false;
  input.focus();
}
</script>
