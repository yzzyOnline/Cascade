<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🌊%3C/text%3E%3C/svg%3E">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cascade — yzzy.online</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <script>
    fetch("https://yzzyonlineaimiddleware.onrender.com/wake").catch(() => {});
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #050e12;
      --bg2:       #071520;
      --bg3:       #0a1e2e;
      --surface:   #0d2235;
      --border:    #112840;
      --cyan:      #4dd9c0;
      --cyan-dim:  #1a6e5e;
      --cyan-glow: rgba(77, 217, 192, 0.12);
      --text:      #c8dde8;
      --muted:     #4a7a8a;
      --dim:       #1e4a5e;
      --mono:      'DM Mono', monospace;
      --serif:     'Instrument Serif', serif;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--mono); overflow: hidden; }

    body::before {
      content: ''; position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 20% 80%, rgba(13,60,80,0.5) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 20%, rgba(10,45,65,0.4) 0%, transparent 55%),
        radial-gradient(ellipse 100% 80% at 50% 100%, rgba(5,25,40,0.8) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }

    body::after {
      content: ''; position: fixed; inset: 0;
      background: repeating-linear-gradient(180deg, transparent, transparent 60px, rgba(77,217,192,0.015) 60px, rgba(77,217,192,0.015) 61px);
      pointer-events: none; z-index: 0; animation: drift 12s ease-in-out infinite;
    }

    @keyframes drift { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-30px); } }

    .shell { position: relative; z-index: 1; display: grid; grid-template-rows: auto 1fr; height: 100vh; max-width: 860px; margin: 0 auto; padding: 0 24px; }

    header { padding: 28px 0 20px; display: flex; align-items: baseline; justify-content: space-between; border-bottom: 1px solid var(--border); }

    .logo { display: flex; align-items: baseline; gap: 10px; }
    .logo-name { font-family: var(--serif); font-size: 1.6rem; color: var(--cyan); letter-spacing: -0.01em; font-style: italic; }
    .logo-tag { font-family: var(--mono); font-size: 10px; color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase; }

    .nav { display: flex; gap: 20px; align-items: center; }
    .nav a { font-family: var(--mono); font-size: 11px; color: var(--muted); text-decoration: none; letter-spacing: 0.1em; text-transform: uppercase; transition: color 0.15s; }
    .nav a:hover { color: var(--cyan); }

    .chat-wrap { display: grid; grid-template-rows: 1fr auto; padding: 24px 0 28px; gap: 16px; min-height: 0; }

    .messages { overflow-y: auto; display: flex; flex-direction: column; gap: 20px; padding-right: 8px; scrollbar-width: thin; scrollbar-color: var(--dim) transparent; }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 2px; }

    .welcome { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; gap: 16px; padding: 40px 0; animation: fadeIn 0.8s ease both; }
    .welcome-title { font-family: var(--serif); font-size: clamp(2rem,5vw,3rem); color: var(--cyan); font-style: italic; line-height: 1.1; }
    .welcome-sub { font-size: 12px; color: var(--muted); letter-spacing: 0.08em; max-width: 380px; line-height: 1.7; }

    .suggestions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 8px; }
    .suggestion { font-family: var(--mono); font-size: 11px; color: var(--cyan-dim); border: 1px solid var(--border); padding: 6px 14px; cursor: pointer; transition: all 0.15s; background: none; letter-spacing: 0.05em; }
    .suggestion:hover { border-color: var(--cyan-dim); color: var(--cyan); background: var(--cyan-glow); }

    .msg { display: flex; flex-direction: column; gap: 6px; animation: slideUp 0.25s ease both; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .msg-role { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
    .msg.user .msg-role { color: var(--cyan-dim); text-align: right; }
    .msg-body { font-size: 13px; line-height: 1.75; color: var(--text); white-space: pre-wrap; word-break: break-word; }
    .msg.user .msg-body { text-align: right; color: #a8ccd8; }
    .msg-body a { color: var(--cyan); text-decoration: none; border-bottom: 1px solid var(--cyan-dim); }
    .msg-body a:hover { border-bottom-color: var(--cyan); }
    .msg-body code { font-family: var(--mono); font-size: 11.5px; background: var(--surface); border: 1px solid var(--border); padding: 1px 6px; color: var(--cyan); }
    .msg-body pre { background: var(--bg2); border: 1px solid var(--border); border-left: 2px solid var(--cyan-dim); padding: 14px 16px; font-size: 11.5px; overflow-x: auto; margin: 8px 0; line-height: 1.6; color: #7ab8c8; white-space: pre; }

    .thinking { display: flex; gap: 5px; align-items: center; padding: 4px 0; }
    .thinking span { width: 5px; height: 5px; border-radius: 50%; background: var(--cyan-dim); animation: bob 1.2s ease-in-out infinite; }
    .thinking span:nth-child(2) { animation-delay: 0.15s; }
    .thinking span:nth-child(3) { animation-delay: 0.3s; }
    .thinking-label { font-size: 10px; color: var(--dim); letter-spacing: 0.08em; margin-left: 6px; }
    @keyframes bob { 0%,100% { opacity: 0.3; transform: translateY(0); } 50% { opacity: 1; transform: translateY(-4px); } }

    .input-wrap { border: 1px solid var(--border); background: var(--bg2); display: flex; align-items: flex-end; transition: border-color 0.2s; }
    .input-wrap:focus-within { border-color: var(--cyan-dim); box-shadow: 0 0 0 1px var(--cyan-dim), 0 0 20px rgba(77,217,192,0.06); }
    textarea { flex: 1; background: none; border: none; outline: none; resize: none; font-family: var(--mono); font-size: 13px; color: var(--text); padding: 14px 16px; line-height: 1.6; min-height: 48px; max-height: 160px; caret-color: var(--cyan); }
    textarea::placeholder { color: var(--muted); }
    .send-btn { background: none; border: none; border-left: 1px solid var(--border); color: var(--muted); padding: 14px 18px; cursor: pointer; font-family: var(--mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; transition: color 0.15s, background 0.15s; align-self: stretch; display: flex; align-items: center; }
    .send-btn:hover:not(:disabled) { color: var(--cyan); background: var(--cyan-glow); }
    .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    .input-meta { display: flex; justify-content: space-between; align-items: center; padding: 6px 2px 0; }
    .input-hint { font-size: 10px; color: var(--dim); letter-spacing: 0.08em; }
    .answered-by { font-size: 10px; color: var(--dim); letter-spacing: 0.06em; }
    .answered-by span { color: var(--cyan-dim); }
  </style>
</head>
<body>
<div class="shell">
  <header>
    <div class="logo">
      <span class="logo-name">Cascade</span>
      <span class="logo-tag">by yzzy.online</span>
    </div>
    <nav class="nav">
      <a href="https://cascade.yzzy.online">Docs</a>
      <a href="https://yzzy.online">yzzy.online</a>
      <a href="https://github.com/yzzyOnline/Cascade">GitHub</a>
    </nav>
  </header>

  <div class="chat-wrap">
    <div class="messages" id="messages">
      <div class="welcome" id="welcome">
        <div class="welcome-title">Ask me anything<br>about yzzy.online</div>
        <p class="welcome-sub">NetClient setup, Apex Racer tuning, Bullet Game tips, Cascade integration — powered by Cascade.</p>
        <div class="suggestions">
          <button class="suggestion" onclick="fillPrompt('How do I set up a NetClient server?')">How do I set up a NetClient server?</button>
          <button class="suggestion" onclick="fillPrompt('What cars are in Apex Racer?')">What cars are in Apex Racer?</button>
          <button class="suggestion" onclick="fillPrompt('How do I make players join a room?')">How do I make players join a room?</button>
          <button class="suggestion" onclick="fillPrompt('How does Cascade work?')">How does Cascade work?</button>
        </div>
      </div>
    </div>
    <div>
      <div class="input-wrap">
        <textarea id="input" placeholder="Ask about NetClient, Apex Racer, Bullet Game, Cascade..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="send-btn" id="send-btn" onclick="sendMessage()">Send</button>
      </div>
      <div class="input-meta">
        <span class="input-hint">Enter to send · Shift+Enter for newline</span>
        <span class="answered-by" id="answered-by"></span>
      </div>
    </div>
  </div>
</div>

<script>
const ENDPOINT   = 'https://yzzyonlineaimiddleware.onrender.com/ask-ai';
const SECRET     = 'demo-cascade-2026';
const DIFFICULTY = 0.5;

const README_URLS = {
  cascade:   'https://raw.githubusercontent.com/yzzyOnline/Cascade/refs/heads/main/readme.md',
  netclient: 'https://raw.githubusercontent.com/yzzyOnline/netClient/refs/heads/main/readme.md'
};

const readmeCache = {};

const SHORT_SYSTEM_PROMPT = `You are a helpful dev assistant for yzzy.online — a browser-focused game dev site by yzzy online.

You help users understand, debug, and implement code using yzzy.online products. Use the product summaries below as your primary source, and apply general JavaScript, Node.js, and WebSocket knowledge to assist with debugging and implementation.

Never invent API methods or parameters not in the docs. You are powered by Cascade — yzzy.online's multi-provider AI middleware.

GitHub org: https://github.com/yzzyonline. A card game is also in development.

STRICT RULE: Never mention, suggest, or reference any API method, parameter, event, property, or file that is not explicitly listed by name in the documentation below. If something is not in the docs, say it does not exist — do not invent it, suggest workarounds using made-up methods, or fill gaps with outside knowledge. If you cannot answer fully from the docs, say so and link to the full docs instead.

---

## Cascade (summary)
Self-hosted REST middleware routing AI prompts across Gemini, Groq, Mistral, and Cerebras.
- POST /ask-ai — body: { secret, difficulty (0.0-1.0), prompt }. Returns { state, package, answeredBy }.
- GET /wake — cold-start ping. GET /health — uptime, model count, key pools, config.
- difficulty maps to starting model index. too_complex climbs up. errors fall back down.
- Key rotation: pipe-separated keys (GEMINI_KEY=keyA|keyB). ALLOWED_ORIGINS for whitelisting.
- Supported providers: Gemini, Groq, Mistral, Cerebras only. Claude and OpenAI are not supported.
- Full docs: https://cascade.yzzy.online

**Cascade known issues:**
- Slow first request: Render's free tier spins down after 15 min idle. First request after idle takes 30-60s. Use GET /wake beforehand.
- Model skipped silently: If a provider has no API key configured it is skipped at runtime with no error — check .env and GET /health to see key pool counts.
- All models failed (503): Every model was tried and none succeeded. Check /health to verify keys are loaded.
- What model answered: the answeredBy field in the response contains the provider and model name.

## NetClient (summary)
Zero-dependency WebSocket library for browser games. Single ES module file.
- new NetClient(url, gameName). Connect with net.connect().
- Rooms: createRoom, joinRoom, leaveRoom, listRooms
- Messaging: sendRelay (broadcast), tellOwner, tellPlayer, sendBinary (ArrayBuffer)
- Host controls: addTag, removeTag, updateMeta, setMeta
- Events: connected, assignedId, roomCreated, roomJoined, playerJoined, playerLeft, relay, tellOwner, tellPlayer, binary, makeHost, reassignedHost, roomList, error
- Properties: net.playerId, net.roomId, net.ownerId, net.isHost
- Full docs: https://netclient.yzzy.online
- NOT compatible with Unity, Unreal, or non-browser environments — browser ES module only.
- server.js is a pre-built companion file downloaded from https://github.com/yzzyonline/netClient — users do NOT write it themselves. Never show or invent server.js code.

**NetClient known limitations:**
- No player list on join: roomJoined does not include existing players. Workaround: send state on join with sendRelay and listen for relay from others.
- No reconnection: dropped connections always get a new playerId — no way to reclaim a previous ID.
- No net.off(): listeners persist for the lifetime of the instance. Use a flag variable to gate callbacks.
- relay is a NetClient concept — it is not part of Cascade. Do not confuse the two.
- server.js is a NetClient companion file — it is not part of Cascade.

## Apex Racer (summary)
Browser racing game — Babylon.js, Pacejka physics. 3 cars: Katana (RWD), Bruiser (AWD), Spec R (FWD). Full JSON tuning config. Play: https://apexracer.yzzy.online

## Bullet Game (summary)
Top-down pixel roguelike in Godot, exported to browser. 5 guns. Boss flash colours = attack type. Play: https://bulletgame.yzzy.online

---

ROUTING RULES:
allowed needed docs : netclient, cascade
Return {"state":"need_docs","package":{"api":"cascade"}} or {"state":"need_docs","package":{"api":"netclient"}} for ANY Cascade or NetClient question involving setup, install, deploy, implement, integrate, specific parameters, debugging, errors, code examples, or environment variables.

Only answer from summaries for: general "what is X" overviews, Apex Racer, Bullet Game, yzzy.online broadly.

GENERAL ANSWER RULES:
- Always answer in the context of yzzy.online and its products.
- Use only the information in the summaries above. Do not use outside knowledge.
- DO NOT ANSWER QUESTIONS THAT DO NOT PRETAIN TO yzzy.online or its products. Instead, respond with "I am designed to help with yzzy.online products. Please ask about NetClient, Cascade, Apex Racer, or Bullet Game!"
For normal answers: {"state":"complete","package":{"reply":"your answer here"}}

Return ONLY raw JSON. No markdown, no extra text.`;

function detectNeedDocs(data, rawStr) {
  if (data?.state === 'need_docs') return data.package?.api || null;
  if (!rawStr) return null;
  if (/need.?docs/i.test(rawStr)) {
    if (/netclient/i.test(rawStr)) return 'netclient';
    if (/cascade/i.test(rawStr)) return 'cascade';
  }
  const bare = rawStr.match(/"api"\s*:\s*"(cascade|netclient)"/i);
  if (bare) return bare[1].toLowerCase();
  return null;
}

function buildFullSystemPrompt(api, readme) {
  const docs = readme || '(documentation unavailable)';
  return `You are an assistant for yzzy.online. Answer the user's question using ONLY the documentation below. Do not use outside knowledge — if it is not in the docs, say so and link to the full docs.
STRICT RULE: Never mention, suggest, or reference any API method, parameter, event, or property that is not explicitly listed by name in the documentation below. If something does not exist in the docs, say it does not exist — do not invent it.
--- DOCUMENTATION START ---
${docs}
--- DOCUMENTATION END ---

Return ONLY this JSON: {"state":"complete","package":{"reply":"your answer here"}}
No markdown fences. No extra text. Just the JSON object.`;
}

function buildPrompt(systemPrompt, history, userMessage) {
  const convo = history.slice(0, -1)
    .map(m => `${m.role === 'user' ? 'User' : 'Assistant'}: ${m.content}`)
    .join('\n');
  return `${systemPrompt}\n\n---\n${convo ? `Conversation so far:\n${convo}\n\n` : ''}User: ${userMessage}\n\nReturn ONLY a JSON object. No markdown. No explanation.`;
}

let history = [];
let isLoading = false;

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 160) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function fillPrompt(text) {
  const input = document.getElementById('input');
  input.value = text;
  autoResize(input);
  input.focus();
}

function formatMessage(text) {
  return text
    .replace(/```([\s\S]*?)```/g, '<pre>$1</pre>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>');
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function appendMessage(role, content) {
  const messages = document.getElementById('messages');
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = `<div class="msg-role">${role === 'user' ? 'You' : 'Cascade'}</div><div class="msg-body">${role === 'assistant' ? formatMessage(content) : escapeHtml(content)}</div>`;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

function showThinking() {
  const messages = document.getElementById('messages');
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();
  const div = document.createElement('div');
  div.className = 'msg assistant';
  div.id = 'thinking';
  div.innerHTML = `<div class="msg-role">Cascade</div><div class="thinking"><span></span><span></span><span></span><span class="thinking-label"></span></div>`;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

function setThinkingLabel(label) {
  const el = document.querySelector('#thinking .thinking-label');
  if (el) el.textContent = label;
}

function removeThinking() {
  const el = document.getElementById('thinking');
  if (el) el.remove();
}

async function fetchReadme(api) {
  if (readmeCache[api]) return readmeCache[api];
  try {
    const res = await fetch(README_URLS[api]);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const text = await res.text();
    readmeCache[api] = text;
    return text;
  } catch (e) {
    console.warn(`Failed to fetch ${api} readme:`, e);
    return null;
  }
}

async function callCascade(prompt) {
  const res = await fetch(ENDPOINT, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ secret: SECRET, difficulty: DIFFICULTY, prompt })
  });
  return res.json();
}

function finishResponse(data, answeredByEl) {
  const reply = data.package?.reply || data.package?.response || data.package?.answer || JSON.stringify(data.package);
  history.push({ role: 'assistant', content: reply });
  appendMessage('assistant', reply);
  if (data.answeredBy) {
    answeredByEl.innerHTML = `answered by <span>${data.answeredBy.provider}:${data.answeredBy.model}</span>`;
  }
}

async function sendMessage() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text || isLoading) return;

  isLoading = true;
  document.getElementById('send-btn').disabled = true;
  const answeredByEl = document.getElementById('answered-by');
  answeredByEl.textContent = '';
  input.value = '';
  input.style.height = 'auto';

  appendMessage('user', text);
  history.push({ role: 'user', content: text });
  showThinking();

  try {
    const data = await callCascade(buildPrompt(SHORT_SYSTEM_PROMPT, history, text));
    const rawStr = JSON.stringify(data);
    const needDocsApi = detectNeedDocs(data, rawStr);

    if (needDocsApi) {
      setThinkingLabel(`fetching ${needDocsApi} docs...`);
      const readme = await fetchReadme(needDocsApi);
      console.log(`[stage2] ${needDocsApi} readme fetched:`, readme ? `${readme.length} chars` : 'FAILED');
      const data2 = await callCascade(buildPrompt(buildFullSystemPrompt(needDocsApi, readme), history, text));
      removeThinking();

      if (data2.state === 'complete') {
        finishResponse(data2, answeredByEl);
      } else {
        appendMessage('assistant', 'All models are currently unavailable. Try again in a moment.');
      }

    } else if (data.state === 'complete') {
      removeThinking();
      finishResponse(data, answeredByEl);
    } else {
      removeThinking();
      appendMessage('assistant', 'All models are currently unavailable. Try again in a moment.');
    }

  } catch (e) {
    console.error('sendMessage error:', e);
    removeThinking();
    appendMessage('assistant', 'Network error — check your connection and try again.');
  }

  isLoading = false;
  document.getElementById('send-btn').disabled = false;
  input.focus();
}
</script>
</body>
</html>
